{% extends 'base2.html' %}
{% load static %}
{% load custom_filters %}
{% block content %}

<main>
    <div class="widget profile" style="max-width:520px;margin:0 auto;padding:0 0 20px 0;">
        <h3>Profile</h3>
        <form method="POST" enctype="multipart/form-data" action="{% url 'update_profile' %}" style="padding:24px;display:flex;flex-direction:column;gap:16px;">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ user.username }}">
            </div>

            <div class="form-group">
                <label for="displayname">Display Name</label>
                <input type="text" id="displayname" name="displayname" value="{{ user.displayname }}">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ user.email }}">
            </div>

            <div class="form-group">
                <label for="light_mode">Theme</label>
                <select id="light_mode" name="light_mode">
                    <option value="light_mode" {% if user.light_mode == "light_mode" %}selected{% endif %}>Light mode</option>
                    <option value="dark_mode" {% if user.light_mode == "dark_mode" %}selected{% endif %}>Dark mode</option>
                </select>
            </div>

            <div class="form-group">
                <label for="profile_picture">Profile Picture</label>
                <input type="file" id="profile_picture" name="profile_picture">
            </div>

            <div>
                <button type="button" class="btn btn-secondary" onclick="togglePasswordForm()">
                    <i class="fa-solid fa-key"></i> Change Password
                </button>
            </div>

            <div id="password-form" style="display:none;display:flex;flex-direction:column;gap:16px;">
                <div class="form-group">
                    <label for="current_password">Current Password</label>
                    <input type="password" id="current_password" name="current_password">
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password">
                </div>
            </div>

            <div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Save Profile
                </button>
            </div>
        </form>
    </div>
</main>

<script>
    function togglePasswordForm() {
        const form = document.getElementById("password-form");
        form.style.display = form.style.display === "none" ? "flex" : "none";
    }
    document.getElementById("password-form").style.display = "none";
</script>

{% endblock %}
