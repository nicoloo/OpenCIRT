{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCIRT</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    {% block styles %}
    {% endblock %}
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.ico' %}" >
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
        <div class="sidebar">
            <a class=logo href="/home"><img  src="{% static 'logo.png' %}" ></a>

            <div class="bottom-links">
                <a href="/about" class="link">About</a>
                <a href="/about" class="link">Settings</a>



                {% if user.profile_pictureurl %}
                <div class="profile-picture-base">
                    <img src="{{ user.profile_pictureurl }}" alt="{{ user.username }}'s Profile Picture" class="profile-picture-base">
                </div>
                {% else %}
                    <a href="/profile">
                    <div class="default-picture-base" title="{{ user.username }}" >
                        
                        {{ user.username|slice:":1" }}
                    </div>
                    </a>
                {% endif %}

            </div>
        </div>

        {% block content %}{% endblock %}

</html>
