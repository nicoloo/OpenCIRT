{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/join.css">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
</head>
<body>
    <div class="join-container">
        <!-- Logo Section -->
        <a class=logo><img  src="{% static 'logo.png' %}" ></a>

        <!-- Incident Name and Invitation -->
        <h1 class="incident-name">Log in</h1>

        <!-- Registration Form -->
        <form method="POST" class="join-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Set a password" required>
            </div>
            {% if error %}
            <p>{{ error }}</p>
            {% endif %}
            <button type="submit" class="btn-join">Log in</button>
        </form>
    </div>
</body>
</html>
