{% extends 'base.html' %}
{% load static %}

{% block styles %}
<style>
.about-page {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.about-card {
    background: var(--widget-background-color);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 48px 44px;
    max-width: 420px;
    width: 100%;
    text-align: center;
}

.about-logo {
    height: 48px;
    width: auto;
    margin-bottom: 28px;
}

.about-version {
    display: block;
    width: fit-content;
    margin: 0 auto 28px;
    padding: 3px 12px;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-color-2);
    background: var(--background-color);
    letter-spacing: 0.04em;
}

.about-divider {
    height: 1px;
    background: var(--border-color);
    margin: 0 0 24px 0;
}

.about-license-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-color-2);
    margin: 0 0 10px 0;
}

.about-license-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: var(--background-color);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-color-1);
    margin-bottom: 10px;
    text-decoration: none;
    transition: border-color 0.15s;
}

.about-license-badge:hover {
    border-color: var(--main-color-3);
    text-decoration: none;
    color: var(--text-color-1);
}

.about-license-badge i {
    color: var(--accent-color);
}

.about-copyright {
    font-size: 0.78rem;
    color: var(--text-color-2);
    margin: 0;
}
</style>
{% endblock %}

{% block content %}
<div class="about-page">
    <div class="about-card">

        {% if user.is_authenticated and user.light_mode == 'dark_mode' %}
        <img src="{% static 'logo_phrase_dark.png' %}" alt="OpenCIRT" class="about-logo"
             onerror="this.onerror=null;this.src='{% static 'logo_phrase_light.png' %}'">
        {% else %}
        <img src="{% static 'logo_phrase_light.png' %}" alt="OpenCIRT" class="about-logo">
        {% endif %}

        <div class="about-version">Version 1.0</div>

        <div class="about-divider"></div>

        <p class="about-license-title">License</p>
        <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener noreferrer" class="about-license-badge">
            <i class="fa-solid fa-scale-balanced"></i>
            MIT License
        </a>
        <p class="about-copyright">Copyright &copy; 2026 OpenCIRT Contributors</p>

    </div>
</div>
{% endblock %}
