{% extends 'base.html' %}
{% load static %}

{% block styles %}
<style>
.notfound-page {
    min-height: calc(100vh - 64px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.notfound-card {
    background: var(--widget-background-color);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 52px 44px 44px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0, 0, 0, 0.06);
}

.notfound-icon-wrap {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
}

.notfound-icon-wrap i {
    font-size: 1.9rem;
    color: #3b82f6;
}

.notfound-code {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-color-2);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 10px 0;
}

.notfound-title {
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--text-color-1);
    margin: 0 0 14px 0;
    letter-spacing: -0.01em;
}

.notfound-reason {
    font-size: 0.9rem;
    color: var(--text-color-2);
    line-height: 1.65;
    margin: 0 0 28px 0;
}

.notfound-divider {
    height: 1px;
    background: var(--border-color);
    margin: 0 0 24px 0;
}

.notfound-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.notfound-actions .btn {
    min-width: 120px;
    justify-content: center;
}
</style>
{% endblock %}

{% block content %}
<div class="notfound-page">
    <div class="notfound-card">

        <div class="notfound-icon-wrap">
            <i class="fa-solid fa-compass"></i>
        </div>

        <p class="notfound-code">Error 404</p>
        <h1 class="notfound-title">Page Not Found</h1>

        <p class="notfound-reason">{{ reason|default:"The page or resource you requested does not exist or may have been deleted." }}</p>

        <div class="notfound-divider"></div>

        <div class="notfound-actions">
            <button onclick="history.back()" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i>
                Go Back
            </button>
            <a href="{% url 'home' %}" class="btn btn-primary">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
        </div>

    </div>
</div>
{% endblock %}
